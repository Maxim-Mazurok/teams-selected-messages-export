name: Release Extension

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm

      - run: npm ci

      - run: npm test

      - run: npm run package:extension

      - name: Read version from manifest
        id: version
        run: |
          version=$(node -e "const manifest = JSON.parse(require('fs').readFileSync('extension-src/manifest.json', 'utf8')); process.stdout.write(manifest.version)")
          echo "value=$version" >> "$GITHUB_OUTPUT"

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.value }}-${{ github.run_number }}
          name: Teams Selected Messages Export v${{ steps.version.outputs.value }} (build ${{ github.run_number }})
          files: artifacts/teams-selected-messages-export-extension.zip
          generate_release_notes: true
